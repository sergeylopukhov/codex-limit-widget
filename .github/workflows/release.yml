name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build release archive
        run: ./scripts/make-release.command

      - name: Prepare release description
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_NAME=Codex Limit Widget $VERSION" >> "$GITHUB_ENV"

          if [ "$GITHUB_REF_NAME" = "v1.1.0" ]; then
            {
              echo "## Release Notes"
              echo
              echo "This release adds three new editorial-style widgets."
              echo
              echo "- Adds separate small, medium, and large warm paper widgets with serif typography."
              echo "- Keeps the same Codex limit data source and refresh behavior as the existing widget."
              echo "- Shows remaining 5-hour limit, exact 5-hour reset time, and an explicitly labeled weekly limit bar."
              echo "- Removes request counts from the editorial widgets."
              echo
              echo "## Installation"
              echo
              echo "Download \`CodexLimitWidget-1.1.0-macOS.dmg\`, open it, and drag \`Codex Limit Widget.app\` to \`Applications\`."
            } > release-description.md
          elif [ "$GITHUB_REF_NAME" = "v1.0.9" ]; then
            {
              echo "## Release Notes"
              echo
              echo "This release simplifies Widget settings."
              echo
              echo "- Keeps only the \`Show last updated time\` toggle in the Widget section."
              echo "- Keeps core widget lines enabled internally for existing installs."
              echo
              echo "## Installation"
              echo
              echo "Download \`CodexLimitWidget-1.0.9-macOS.dmg\`, open it, and drag \`Codex Limit Widget.app\` to \`Applications\`."
            } > release-description.md
          elif [ "$GITHUB_REF_NAME" = "v1.0.8" ]; then
            {
              echo "## Release Notes"
              echo
              echo "This release fixes empty widgets in ad-hoc builds by restoring a WidgetKit-readable local fallback cache."
              echo
              echo "- Writes cached snapshots and widget settings into the WidgetKit extension support container."
              echo "- Keeps App Group JSON and App Group UserDefaults writes for signed builds and compatibility."
              echo "- Preserves the one-minute WidgetKit timeline refresh behavior."
              echo
              echo "## Installation"
              echo
              echo "Download \`CodexLimitWidget-1.0.8-macOS.dmg\`, open it, and drag \`Codex Limit Widget.app\` to \`Applications\`."
            } > release-description.md
          elif [ "$GITHUB_REF_NAME" = "v1.0.7" ]; then
            {
              echo "## Release Notes"
              echo
              echo "This release fixes the empty widget state by adding a second App Group storage path for cached limit data."
              echo
              echo "- Writes cached snapshots and widget settings to App Group \`UserDefaults\` as well as JSON files."
              echo "- Lets the WidgetKit extension fall back to App Group \`UserDefaults\` if file reads return no data."
              echo "- Keeps the existing App Group JSON files for compatibility."
              echo
              echo "## Installation"
              echo
              echo "Download \`CodexLimitWidget-1.0.7-macOS.dmg\`, open it, and drag \`Codex Limit Widget.app\` to \`Applications\`."
            } > release-description.md
          elif [ "$GITHUB_REF_NAME" = "v1.0.6" ]; then
            {
              echo "## Release Notes"
              echo
              echo "This release makes widget refreshes visible and applies the saved widget display settings in the WidgetKit extension."
              echo
              echo "- Added an \`UPDATED HH:mm:ss\` indicator to the widget."
              echo "- Made the widget read saved options for 5-hour, weekly, reset time, last updated, and stale warning display."
              echo "- Reloaded WidgetKit timelines after successful refreshes and cached error updates."
              echo
              echo "## Installation"
              echo
              echo "Download \`CodexLimitWidget-1.0.6-macOS.dmg\`, open it, and drag \`Codex Limit Widget.app\` to \`Applications\`."
            } > release-description.md
          elif [ "$GITHUB_REF_NAME" = "v1.0.5" ]; then
            {
              echo "## Release Notes"
              echo
              echo "This release replaces the installer script with a normal drag-to-Applications DMG."
              echo
              echo "- Removed \`install.command\` from release archives."
              echo "- Added a custom DMG background with an arrow from the app to the Applications shortcut."
              echo "- Kept the ZIP archive for manual installation."
              echo
              echo "## Installation"
              echo
              echo "Download \`CodexLimitWidget-1.0.5-macOS.dmg\`, open it, and drag \`Codex Limit Widget.app\` to \`Applications\`."
            } > release-description.md
          elif [ "$GITHUB_REF_NAME" = "v1.0.4" ]; then
            {
              echo "## Release Notes"
              echo
              echo "This release stops macOS from repeatedly asking Codex Limit Widget for access to data from other apps."
              echo
              echo "- Removed direct reads and writes to the WidgetKit extension container under \`~/Library/Containers\`."
              echo "- Kept widget sharing on the App Group container, which is the intended shared storage path."
              echo "- Preserved the normal Application Support fallback for non-widget app data."
              echo
              echo "## Installation"
              echo
              echo "Download \`CodexLimitWidget-1.0.4-macOS.dmg\`, open it, and drag \`Codex Limit Widget.app\` to \`Applications\`."
            } > release-description.md
          elif [ "$GITHUB_REF_NAME" = "v1.0.3" ]; then
            {
              echo "## Release Notes"
              echo
              echo "This release fixes the missing Codex Limit Widget app icon in the macOS widget picker."
              echo
              echo "- Bundled \`AppIcon.icns\` inside both the host app and WidgetKit extension."
              echo "- Declared \`CFBundleIconFile\` for both bundles so macOS can resolve the icon when showing widget options."
              echo "- Kept the existing asset catalog icons in place for normal app icon handling."
              echo
              echo "## Installation"
              echo
              echo "Download \`CodexLimitWidget-1.0.3-macOS.dmg\`, open it, and run \`install.command\`."
            } > release-description.md
          elif [ "$GITHUB_REF_NAME" = "v1.0.2" ]; then
            {
              echo "## Release Notes"
              echo
              echo "This release fixes a long-running refresh hang that could make the menu bar app and widgets stop updating until the app was restarted."
              echo
              echo "- Added bounded JSON-RPC response timeouts for \`codex app-server --stdio\`."
              echo "- Switched stdout handling to asynchronous pipe reads so a stalled Codex response cannot block refresh forever."
              echo "- Moved child process cleanup off the main refresh path and added a fallback kill after a short grace period."
              echo "- Kept the last cached snapshot visible when a refresh fails, while allowing later refresh attempts to continue normally."
              echo
              echo "## Installation"
              echo
              echo "Download \`CodexLimitWidget-1.0.2-macOS.dmg\`, open it, and run \`install.command\`."
            } > release-description.md
          else
            {
              echo "Codex Limit Widget $VERSION macOS release."
              echo
              echo "Download the DMG, open it, and drag \`Codex Limit Widget.app\` to \`Applications\`."
            } > release-description.md
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexLimitWidget-macOS
          path: |
            release/CodexLimitWidget-*-macOS.dmg
            release/CodexLimitWidget-*-macOS.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_NAME }}
          body_path: release-description.md
          overwrite_files: true
          files: |
            release/CodexLimitWidget-*-macOS.dmg
            release/CodexLimitWidget-*-macOS.zip

      - name: Update GitHub Release description
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file release-description.md
